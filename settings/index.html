<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Space Manager Settings</title>
    <link rel="stylesheet" href="settings.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Space Manager Settings</h1>
        <p class="subtitle">Control behavior when switching Spaces.</p>
      </header>
      <section class="card">
        <label class="toggle-row" for="auto-discard-hidden-tabs">
          <span class="toggle-text">
            <strong>Discard hidden tabs on Space switch</strong>
            <span class="muted">When enabled, hidden tabs from other Spaces may be discarded to reduce memory usage.</span>
          </span>
          <input id="auto-discard-hidden-tabs" type="checkbox">
        </label>
      </section>
      <section class="card recovery-card">
        <h2>Recovery</h2>
        <button id="reset-spaces-view" class="danger-button" type="button">Reset Spaces View</button>
        <p class="muted">Shows all tabs in this window, restores saved tab groups, and switches to No Space. Container identities are preserved.</p>
      </section>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script src="../background/core/namespace.js"></script>
    <script src="../background/core/constants.js"></script>
    <script src="../background/services/ExtensionSettingsService.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
